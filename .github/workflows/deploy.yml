name: Deploy to static-web branch

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'static-web'
  cancel-in-progress: true

jobs:
  deploy:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun i
      - name: Build
        run: bun run build
        env:
          VITE_GITHUB_URL: ${{ github.server_url }}/${{ github.repository }}
      - name: Commit to static-web branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: static-web
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MESSAGE: "Build: ({sha}) {msg}"
          SQUASH_HISTORY: true
          SKIP_EMPTY_COMMITS: true